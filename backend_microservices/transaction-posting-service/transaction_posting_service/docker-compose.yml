version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: transaction-posting-db
    environment:
      POSTGRES_DB: transaction_posting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transaction-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: transaction-posting-kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transaction-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: transaction-posting-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - transaction-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transaction-posting-service
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: transaction_posting
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_POOL_MIN: 2
      DB_POOL_MAX: 10
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: transaction-posting-service
      KAFKA_TOPIC_TRANSACTION_POSTED: transaction.posted
      SERVICE_TOKEN: your-internal-service-token-here
      LOG_LEVEL: info
      CORS_ALLOW_ALL: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health/live', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3
    networks:
      - transaction-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local

networks:
  transaction-network:
    driver: bridge
