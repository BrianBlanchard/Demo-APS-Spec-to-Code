version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: email-notification-db
    environment:
      POSTGRES_DB: email_notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - email-notification-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-notification-service
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: email_notification_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_POOL_MIN: 2
      DB_POOL_MAX: 10
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@example.com}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-Email Notification Service}
      EMAIL_RETRY_ATTEMPTS: 3
      EMAIL_RETRY_DELAY_MS: 1000
      CORS_ORIGIN: "*"
      CORS_CREDENTIALS: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - email-notification-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health/live', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

networks:
  email-notification-network:
    driver: bridge

volumes:
  postgres_data:
