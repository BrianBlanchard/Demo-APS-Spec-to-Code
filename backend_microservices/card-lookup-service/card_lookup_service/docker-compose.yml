version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: card-lookup-postgres
    environment:
      POSTGRES_DB: card_lookup_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - card-lookup-network

  redis:
    image: redis:7-alpine
    container_name: card-lookup-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - card-lookup-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: card-lookup-service
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: card_lookup_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_POOL_MIN: 2
      DB_POOL_MAX: 10
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CACHE_TTL_SECONDS: 120
      API_TIMEOUT_MS: 3000
      RATE_LIMIT_REQUESTS: 500
      RATE_LIMIT_WINDOW_MS: 60000
      CORS_ORIGIN: '*'
      CORS_CREDENTIALS: 'true'
      JWT_SECRET: 'your-secret-key-here'
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/health/live', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - card-lookup-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  card-lookup-network:
    driver: bridge
