openapi: 3.0.3
info:
  title: Transaction Reporting Service API
  version: 1.0.0
  description: |
    Generates comprehensive transaction reports for operational monitoring, regulatory compliance, and business analysis.
    Supports daily transaction summaries, declined transaction reports, merchant analysis, and category-based spending reports with multiple export formats.
  contact:
    name: API Support
    email: api-support@example.com

servers:
  - url: http://localhost:3000
    description: Local development server
  - url: http://transaction-reporting-service:3000
    description: Docker containerized environment
  - url: https://dev-api.example.com
    description: Development environment
  - url: https://staging-api.example.com
    description: Staging environment
  - url: https://api.example.com
    description: Production environment

tags:
  - name: Reports
    description: Transaction report generation endpoints
  - name: Health
    description: Service health check endpoints

paths:
  /api/v1/reports/transactions:
    post:
      tags:
        - Reports
      summary: Generate transaction report
      description: |
        Generates a comprehensive transaction report based on specified parameters.
        Large date ranges (>90 days) are processed asynchronously.
      operationId: generateTransactionReport
      parameters:
        - name: x-trace-id
          in: header
          description: Correlation ID for request tracing
          required: false
          schema:
            type: string
            example: "1705320000000-ABC12345"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRequest'
            examples:
              dailySummary:
                summary: Daily summary report
                value:
                  reportType: daily_summary
                  dateRange:
                    startDate: "2024-01-01T00:00:00Z"
                    endDate: "2024-01-31T23:59:59Z"
                  format: pdf
                  includeGraphs: true
              declinedTransactions:
                summary: Declined transactions report
                value:
                  reportType: declined_transactions
                  dateRange:
                    startDate: "2024-01-01T00:00:00Z"
                    endDate: "2024-01-31T23:59:59Z"
                  format: csv
                  includeGraphs: false
      responses:
        '201':
          description: Report generation initiated successfully
          headers:
            x-trace-id:
              description: Correlation ID for request tracing
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
              examples:
                success:
                  summary: Successful report generation
                  value:
                    reportId: "RPT-20240115-ABC123"
                    reportType: daily_summary
                    generatedAt: "2024-01-15T10:30:00Z"
                    downloadUrl: "https://reports.example.com/RPT-20240115-ABC123.pdf"
                    expiresAt: "2024-01-22T10:30:00Z"
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidDateRange:
                  summary: Invalid date range
                  value:
                    errorCode: "VALIDATION_ERROR"
                    message: "Start date must be before or equal to end date"
                    timestamp: "2024-01-15T10:30:00Z"
                    traceId: "1705320000000-ABC12345"
                futureDate:
                  summary: Future date provided
                  value:
                    errorCode: "VALIDATION_ERROR"
                    message: "Start date cannot be in the future"
                    timestamp: "2024-01-15T10:30:00Z"
                    traceId: "1705320000000-ABC12345"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                reportGenerationError:
                  summary: Report generation failed
                  value:
                    errorCode: "REPORT_GENERATION_ERROR"
                    message: "Failed to generate report"
                    timestamp: "2024-01-15T10:30:00Z"
                    traceId: "1705320000000-ABC12345"
        '503':
          description: Service unavailable (database connection error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                databaseError:
                  summary: Database unavailable
                  value:
                    errorCode: "DATABASE_ERROR"
                    message: "Failed to create report"
                    timestamp: "2024-01-15T10:30:00Z"
                    traceId: "1705320000000-ABC12345"

  /health/ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: Checks if the service is ready to accept traffic (includes database connectivity check)
      operationId: readinessCheck
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: healthy
                timestamp: "2024-01-15T10:30:00Z"
                uptime: 3600.5
                database:
                  connected: true
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: unhealthy
                timestamp: "2024-01-15T10:30:00Z"
                uptime: 3600.5
                database:
                  connected: false

  /health/live:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: Checks if the service is alive (does not check external dependencies)
      operationId: livenessCheck
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: healthy
                timestamp: "2024-01-15T10:30:00Z"
                uptime: 3600.5
                database:
                  connected: true

  /api/v1/transaction-reporting/health:
    get:
      tags:
        - Health
      summary: Service health check
      description: Versioned health check endpoint with full service status
      operationId: serviceHealthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: healthy
                timestamp: "2024-01-15T10:30:00Z"
                uptime: 3600.5
                database:
                  connected: true
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: unhealthy
                timestamp: "2024-01-15T10:30:00Z"
                uptime: 3600.5
                database:
                  connected: false

components:
  schemas:
    ReportRequest:
      type: object
      required:
        - reportType
        - dateRange
        - format
      properties:
        reportType:
          type: string
          enum:
            - daily_summary
            - declined_transactions
            - merchant_analysis
            - category_spending
          description: Type of report to generate
          example: daily_summary
        dateRange:
          $ref: '#/components/schemas/DateRange'
        format:
          type: string
          enum:
            - pdf
            - csv
          description: Export format for the report
          example: pdf
        includeGraphs:
          type: boolean
          description: Whether to include graphical visualizations in the report
          default: false
          example: true

    DateRange:
      type: object
      required:
        - startDate
        - endDate
      properties:
        startDate:
          type: string
          format: date-time
          description: Start date of the report period (ISO 8601 format)
          example: "2024-01-01T00:00:00Z"
        endDate:
          type: string
          format: date-time
          description: End date of the report period (ISO 8601 format)
          example: "2024-01-31T23:59:59Z"

    ReportResponse:
      type: object
      required:
        - reportId
        - reportType
        - generatedAt
        - downloadUrl
        - expiresAt
      properties:
        reportId:
          type: string
          pattern: '^RPT-\d{8}-[A-Z0-9]{6}$'
          description: Unique identifier for the generated report
          example: "RPT-20240115-ABC123"
        reportType:
          type: string
          enum:
            - daily_summary
            - declined_transactions
            - merchant_analysis
            - category_spending
          description: Type of report generated
          example: daily_summary
        generatedAt:
          type: string
          format: date-time
          description: Timestamp when the report was generated
          example: "2024-01-15T10:30:00Z"
        downloadUrl:
          type: string
          format: uri
          description: URL to download the generated report
          example: "https://reports.example.com/RPT-20240115-ABC123.pdf"
        expiresAt:
          type: string
          format: date-time
          description: Timestamp when the report download link expires
          example: "2024-01-22T10:30:00Z"

    ErrorResponse:
      type: object
      required:
        - errorCode
        - message
        - timestamp
        - traceId
      properties:
        errorCode:
          type: string
          description: Machine-readable error code
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: Human-readable error message
          example: "Start date must be before or equal to end date"
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the error occurred
          example: "2024-01-15T10:30:00Z"
        traceId:
          type: string
          description: Correlation ID for request tracing
          example: "1705320000000-ABC12345"

    HealthResponse:
      type: object
      required:
        - status
        - timestamp
        - uptime
        - database
      properties:
        status:
          type: string
          enum:
            - healthy
            - unhealthy
          description: Overall health status
          example: healthy
        timestamp:
          type: string
          format: date-time
          description: Current server timestamp
          example: "2024-01-15T10:30:00Z"
        uptime:
          type: number
          format: double
          description: Service uptime in seconds
          example: 3600.5
        database:
          type: object
          required:
            - connected
          properties:
            connected:
              type: boolean
              description: Database connection status
              example: true
