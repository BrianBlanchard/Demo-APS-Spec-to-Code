version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: card-replacement-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: card_replacement_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - card-replacement-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: card-replacement-service
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: card_replacement_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_POOL_MIN: 2
      DB_POOL_MAX: 10
      CORS_ORIGIN: "*"
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - card-replacement-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  card-replacement-network:
    driver: bridge
